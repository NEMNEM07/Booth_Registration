<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>스마트 무드등 제작 예약 신청</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #101820;
    --card: #ffffff;
    --ink: #101820;
    --muted: #6b7480;
    --line: #e6e8ec;
    --t1:#FF6B6B; --t2:#FFB100; --t3:#20C4B4; --t4:#7C6CF0; --t5:#2E86AB; --t6:#E84393;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:'Pretendard', -apple-system, sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,177,0,0.18), transparent 45%),
      radial-gradient(circle at 85% 100%, rgba(124,108,240,0.18), transparent 45%),
      var(--bg);
    min-height:100vh;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
  }
  .wrap{ width:100%; max-width:460px; }
  .eyebrow{
    font-family:'Space Grotesk', sans-serif;
    letter-spacing:0.12em;
    font-size:12px;
    color:rgba(255,255,255,0.55);
    text-transform:uppercase;
    text-align:center;
    margin-bottom:10px;
  }
  h1{
    font-size:25px;
    line-height:1.3;
    color:#fff;
    text-align:center;
    margin:0 0 4px;
    font-weight:700;
  }
  .sub{
    text-align:center;
    color:rgba(255,255,255,0.6);
    font-size:14px;
    margin-bottom:22px;
  }
  .card{
    background:var(--card);
    border-radius:20px;
    padding:28px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .tabs{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .tab-btn{
    flex:1;
    background:none;
    border:1px solid var(--line);
    border-radius:10px;
    padding:9px 6px;
    font-size:13px;
    font-family:inherit;
    color:var(--muted);
    cursor:pointer;
    font-weight:600;
  }
  .tab-btn.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    margin:14px 0 6px;
  }
  label:first-of-type{ margin-top:0; }
  .field-hint{
    font-size:11.5px;
    color:var(--muted);
    margin-top:5px;
    line-height:1.5;
  }
  textarea{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:14px;
    font-family:inherit;
    outline:none;
    transition:border-color .15s;
    resize:vertical;
    min-height:56px;
    line-height:1.5;
  }
  textarea::placeholder{ color:#b7bcc4; }
  textarea:focus{ border-color:var(--ink); }
  .req{ color:var(--t1); font-weight:600; }
  .count-badge{
    display:inline-block;
    font-family:'Space Grotesk', sans-serif;
    font-size:11px;
    font-weight:600;
    color:var(--muted);
    margin-left:6px;
  }
  button.primary{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--ink);
    color:#fff;
    font-size:15px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  button.primary:disabled{ opacity:0.5; cursor:default; }
  button.primary:active{ transform:scale(0.98); }
  .hint{ font-size:12px; color:var(--muted); margin-top:10px; text-align:center; line-height:1.6; }
  .error{ color:var(--t1); font-size:13px; margin-top:10px; display:none; line-height:1.5; }

  /* Result ticket */
  .ticket{ display:none; text-align:center; }
  .ticket .stamp{
    font-family:'Space Grotesk', sans-serif;
    font-size:12px;
    letter-spacing:0.15em;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .badge{
    width:150px; height:150px;
    border-radius:50%;
    margin:0 auto 18px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#fff;
    box-shadow:0 12px 30px rgba(0,0,0,0.18);
  }
  .badge .num{
    font-family:'Space Grotesk', sans-serif;
    font-size:52px;
    font-weight:700;
    line-height:1;
  }
  .badge .label{ font-size:13px; font-weight:600; margin-top:4px; }
  .result-msg{ font-size:15px; color:var(--ink); line-height:1.6; margin-bottom:10px; }
  .result-msg b{ font-weight:700; }
  .member-list{
    text-align:left;
    background:#f7f8fa;
    border-radius:12px;
    padding:12px 14px;
    font-size:13px;
    color:var(--ink);
    line-height:1.9;
    margin-bottom:6px;
  }
  .member-list .mi{ color:var(--muted); font-family:'Space Grotesk', sans-serif; font-size:12px; margin-right:6px; }
  .waitlist-note{
    font-size:13px; color:var(--muted); background:#f7f4ea; border-radius:10px; padding:10px 14px; margin-top:12px;
  }
  button.ghost{
    width:100%;
    margin-top:18px;
    padding:12px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:none;
    color:var(--ink);
    font-size:14px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
  }

  /* Status view */
  .status-list{ display:flex; flex-direction:column; gap:10px; }
  .team-row{
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
  }
  .team-row.empty{ border-style:dashed; }
  .team-row .top{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:6px;
  }
  .team-row .tname{
    display:flex; align-items:center; gap:8px;
    font-weight:700; font-size:14px;
  }
  .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .team-row .stat{
    font-family:'Space Grotesk', sans-serif;
    font-size:12px; color:var(--muted); font-weight:600;
  }
  .members{ font-size:12.5px; color:var(--ink); margin-top:4px; line-height:1.7; word-break:keep-all; }
  .members .g{ color:var(--muted); }
  .waitlist-box{
    margin-top:6px;
    border-radius:12px;
    padding:12px 14px;
    background:#fafafa;
    font-size:12.5px;
    color:var(--muted);
    line-height:1.8;
  }
  .waitlist-box b{ color:var(--ink); }
  .refresh-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px;
  }
  .refresh-row button{
    background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer; text-decoration:underline; font-family:inherit;
  }
  .admin-link{ text-align:center; margin-top:16px; }
  .admin-link a{
    font-size:11px; color:rgba(255,255,255,0.35); text-decoration:none; cursor:pointer;
  }
  .loading-spin{
    display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.4);
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Booth Registration</div>
  <h1>스마트 무드등 제작 예약 신청</h1>
  <div class="sub">한 조(5~6명)씩 한 번에 신청해주세요</div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tabFormBtn" onclick="showTab('form')">신청하기</button>
      <button class="tab-btn" id="tabStatusBtn" onclick="showTab('status')">현황보기</button>
    </div>

    <!-- FORM VIEW -->
    <div id="formView">
      <div id="regForm">
        <label>이름 목록 <span class="req">*</span><span class="count-badge" id="nameCount"></span></label>
        <textarea id="fNames" rows="2" placeholder="홍길동, 홍길동2, 홍길동3, 홍길동4, 홍길동5"></textarea>
        <div class="field-hint">쉼표( , )로 구분해서 5~6명 이름을 한 번에 입력하세요.</div>

        <label>학번 목록 <span class="req">*</span><span class="count-badge" id="gradeCount"></span></label>
        <textarea id="fGrades" rows="2" placeholder="2301, 2308, 2315, 2320, 2325"></textarea>
        <div class="field-hint">이름 순서와 동일한 순서로, 쉼표로 구분해서 입력하세요.</div>

        <button type="button" class="primary" id="submitBtn">신청하고 조 배정받기</button>
        <div class="error" id="formError"></div>
        <div class="hint">한 번의 신청으로 한 조(5~6명)가 통째로 배정됩니다.<br>6개 조가 모두 마감되면 예비 순번으로 등록됩니다.</div>
      </div>

      <!-- RESULT TICKET -->
      <div class="ticket" id="ticketView">
        <div class="stamp" id="ticketStamp">Assigned</div>
        <div class="badge" id="ticketBadge">
          <div class="num" id="ticketNum">1</div>
          <div class="label" id="ticketLabel">조</div>
        </div>
        <div class="result-msg" id="ticketMsg"></div>
        <div class="member-list" id="ticketMembers"></div>
        <div class="waitlist-note" id="ticketNote" style="display:none;"></div>
        <button class="ghost" onclick="resetForm()">다시 신청하기</button>
      </div>
    </div>

    <!-- STATUS VIEW -->
    <div id="statusView" style="display:none;">
      <div class="refresh-row">
        <span style="font-size:12px; color:var(--muted);" id="statusUpdated">-</span>
        <button onclick="loadAndRenderStatus()">새로고침</button>
      </div>
      <div class="status-list" id="statusList"></div>
      <div class="waitlist-box" id="waitlistBox"></div>
    </div>
  </div>

  <div class="admin-link"><a onclick="adminReset()">관리자 초기화</a></div>s
</div>

<script>
// ⚠️ 배포한 구글 앱스 스크립트 "웹 앱 URL"을 여기에 붙여넣으세요.
// (Apps Script 편집기 > 배포 > 새 배포 > 웹 앱 > 배포 후 나오는 URL)
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0X-6iqyADoBQY58lv1t2-GTR-WKjRUYDggBQtz4vUAR_ziUWZS_44ZC9dL4PfxN5k/exec';

const TEAM_COUNT = 6;
const MIN_SIZE = 5;
const MAX_SIZE = 6;
const TEAM_COLORS = ['#FF6B6B','#FFB100','#20C4B4','#7C6CF0','#2E86AB','#E84393'];

function showTab(which){
  document.getElementById('tabFormBtn').classList.toggle('active', which==='form');
  document.getElementById('tabStatusBtn').classList.toggle('active', which==='status');
  document.getElementById('formView').style.display = which==='form' ? 'block' : 'none';
  document.getElementById('statusView').style.display = which==='status' ? 'block' : 'none';
  if(which==='status') loadAndRenderStatus();
}

function parseList(str){
  return str.split(',').map(s => s.trim()).filter(s => s.length > 0);
}

function updateCounts(){
  const names = parseList(document.getElementById('fNames').value);
  const grades = parseList(document.getElementById('fGrades').value);
  document.getElementById('nameCount').textContent = names.length ? names.length + '명' : '';
  document.getElementById('gradeCount').textContent = grades.length ? grades.length + '명' : '';
}
document.getElementById('fNames').addEventListener('input', updateCounts);
document.getElementById('fGrades').addEventListener('input', updateCounts);

window.addEventListener('DOMContentLoaded', () => {
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('PUT_YOUR') !== -1){
    const errorEl = document.getElementById('formError');
    errorEl.textContent = '설정이 안 되어 있어요: 코드 상단의 APPS_SCRIPT_URL 값을 배포한 구글 앱스 스크립트 URL로 바꿔주세요.';
    errorEl.style.display = 'block';
  }
});

async function loadRegs(){
  const res = await fetch(APPS_SCRIPT_URL + '?action=list');
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || 'load_failed');
  return data.registrations;
}

async function registerGroup(entryId, members){
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'register', entryId, members })
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || 'register_failed');
  return data; // { team, waitlistNum, entryId }
}

document.getElementById('submitBtn').addEventListener('click', async function(){
  const errorEl = document.getElementById('formError');
  errorEl.style.display = 'none';

  const names = parseList(document.getElementById('fNames').value);
  const grades = parseList(document.getElementById('fGrades').value);

  if(names.length === 0 || grades.length === 0){
    errorEl.textContent = '이름과 학번을 모두 입력해주세요.';
    errorEl.style.display = 'block';
    return;
  }
  if(names.length !== grades.length){
    errorEl.textContent = '이름 수(' + names.length + ')와 학번 수(' + grades.length + ')가 서로 달라요. 같은 순서, 같은 인원수로 입력해주세요.';
    errorEl.style.display = 'block';
    return;
  }
  if(names.length < MIN_SIZE || names.length > MAX_SIZE){
    errorEl.textContent = '한 조는 5~6명이어야 해요. 현재 ' + names.length + '명이 입력되었습니다.';
    errorEl.style.display = 'block';
    return;
  }

  const members = names.map((n, i) => ({ name: n, grade: grades[i] }));

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spin"></span>배정 중...';

  const entryId = 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  let finalEntry = null;

  try{
    const result = await registerGroup(entryId, members);
    finalEntry = { id: result.entryId || entryId, members, team: result.team, waitlistNum: result.waitlistNum, ts: Date.now() };
  }catch(err){
    console.error('신청 처리 중 오류:', err);
    btn.disabled = false;
    btn.textContent = '신청하고 조 배정받기';
    errorEl.textContent = '오류가 발생했어요 (' + (err && err.message ? err.message : '알 수 없는 오류') + '). 잠시 후 다시 시도해주세요.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = false;
  btn.textContent = '신청하고 조 배정받기';

  renderTicket(finalEntry);
});

function renderTicket(entry){
  document.getElementById('regForm').style.display = 'none';
  const ticket = document.getElementById('ticketView');
  ticket.style.display = 'block';

  const badge = document.getElementById('ticketBadge');
  const noteEl = document.getElementById('ticketNote');
  const membersHtml = entry.members.map((m, i) =>
    '<span class="mi">' + (i+1) + '</span>' + m.name + ' (' + m.grade + ')'
  ).join('<br>');
  document.getElementById('ticketMembers').innerHTML = membersHtml;

  if(entry.team){
    badge.style.background = TEAM_COLORS[entry.team-1];
    document.getElementById('ticketStamp').textContent = 'Assigned';
    document.getElementById('ticketNum').textContent = entry.team;
    document.getElementById('ticketLabel').textContent = '조';
    document.getElementById('ticketMsg').innerHTML = '<b>' + entry.team + '조</b>로 배정되었습니다! (' + entry.members.length + '명)';
    noteEl.style.display = 'none';
  } else {
    badge.style.background = '#8b8f96';
    document.getElementById('ticketStamp').textContent = 'Waitlisted';
    document.getElementById('ticketNum').textContent = entry.waitlistNum;
    document.getElementById('ticketLabel').textContent = '예비번호';
    document.getElementById('ticketMsg').innerHTML = '모든 조가 마감되어 <b>예비 ' + entry.waitlistNum + '번</b>으로 등록되었습니다.';
    noteEl.style.display = 'block';
    noteEl.textContent = '자리가 나면 예비번호 순서대로 배정 안내를 받게 됩니다.';
  }
}

function resetForm(){
  document.getElementById('fNames').value = '';
  document.getElementById('fGrades').value = '';
  updateCounts();
  document.getElementById('regForm').style.display = 'block';
  document.getElementById('ticketView').style.display = 'none';
  document.getElementById('formError').style.display = 'none';
}

async function loadAndRenderStatus(){
  const listEl = document.getElementById('statusList');
  listEl.innerHTML = '<div class="hint">불러오는 중...</div>';
  let regs;
  try{
    regs = await loadRegs();
  }catch(err){
    listEl.innerHTML = '<div class="hint">현황을 불러올 수 없어요. (' + (err && err.message ? err.message : '네트워크 오류') + ')</div>';
    document.getElementById('waitlistBox').innerHTML = '';
    return;
  }

  const byTeam = {};
  regs.forEach(r => { if(r.team) byTeam[r.team] = r; });
  const waitlist = regs.filter(r => !r.team);

  listEl.innerHTML = '';
  for(let i=1;i<=TEAM_COUNT;i++){
    const group = byTeam[i];
    const row = document.createElement('div');
    row.className = 'team-row' + (group ? '' : ' empty');
    if(group){
      const membersHtml = group.members.map(m => m.name + ' <span class="g">(' + m.grade + ')</span>').join(', ');
      row.innerHTML = `
        <div class="top">
          <div class="tname"><span class="dot" style="background:${TEAM_COLORS[i-1]}"></span>${i}조</div>
          <div class="stat">${group.members.length}명 · 마감</div>
        </div>
        <div class="members">${membersHtml}</div>
      `;
    } else {
      row.innerHTML = `
        <div class="top">
          <div class="tname"><span class="dot" style="background:${TEAM_COLORS[i-1]}"></span>${i}조</div>
          <div class="stat">모집 중</div>
        </div>
        <div class="members">아직 신청한 조가 없습니다</div>
      `;
    }
    listEl.appendChild(row);
  }

  const waitlistBox = document.getElementById('waitlistBox');
  if(waitlist.length){
    waitlistBox.innerHTML = '<b>예비 명단 (' + waitlist.length + '팀)</b><br>' +
      waitlist.sort((a,b)=>a.waitlistNum-b.waitlistNum).map(w =>
        w.waitlistNum + '. ' + w.members.map(m=>m.name).join(', ')
      ).join('<br>');
  } else {
    waitlistBox.innerHTML = '예비 명단 없음';
  }

  document.getElementById('statusUpdated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
}

async function adminReset(){
  const code = prompt('관리자 코드를 입력하세요');
  if(code === null) return;
  if(!confirm('모든 신청 데이터를 초기화할까요? 이 작업은 되돌릴 수 없습니다.')) return;
  try{
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'reset', code })
    });
    const data = await res.json();
    if(!data.ok){
      alert(data.error === 'invalid_code' ? '코드가 올바르지 않습니다.' : '초기화 실패: ' + data.error);
      return;
    }
    alert('초기화되었습니다.');
    loadAndRenderStatus();
  }catch(err){
    alert('초기화에 실패했어요: ' + (err && err.message ? err.message : '알 수 없는 오류'));
  }
}
</script>
</body>
</html>
